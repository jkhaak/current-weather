- route:
    id: route-direct-fetch-weather-data
    description: Direct Fetch Weather Data
    nodePrefixId: route-direct-fetch-weather-data
    from:
      id: fromd05c
      uri: direct
      parameters:
        name: fetchWeatherData
      steps:
        - unmarshal:
            id: unmarshalInputQuery
            json:
              id: jsonb073
              useDefaultObjectMapper: true
              library: Jackson
        - setVariable:
            id: setVariableQueryObject
            name: queryObject
            expression:
              simple:
                id: simpleddc2
                expression: ${body}
        - setBody:
            id: clearQueryBody
            expression:
              constant:
                id: constant7ffb
        - removeHeaders:
            id: removeQueryHeaders
            pattern: "*"
        - log:
            id: logfe3b
            message: Name is ${variable.queryObject[name]} and City is ${variable.queryObject[city]}
            loggingLevel: INFO
            logLanguage: simple
        - toD:
            id: toDynamicGeocoding
            uri: https://geocoding-api.open-meteo.com/v1/search?name=${variable[queryObject[city]]}&count=10&language=en&format=json
        - setBody:
            id: parseGeocodingData
            expression:
              jq:
                id: jq6ae4
                expression: ".results[0] | {city: .name, latitude, longitude}"
        - unmarshal:
            id: unmarshalGeoData
            json:
              id: json84a6
              library: Jackson
        - setVariable:
            id: setVariableGeoData
            name: geoData
            expression:
              simple:
                id: simplec1e8
                expression: ${body}
        - setBody:
            id: clearGeoDataBody
            expression:
              constant:
                id: constant7ffb
        - removeHeaders:
            id: removeGeoDataHeaders
            pattern: "*"
        - toD:
            id: toDynamicForecast
            uri: https://api.open-meteo.com/v1/forecast?latitude=${variable.geoData[latitude]}&longitude=${variable.geoData[longitude]}&current_weather=true
        - setBody:
            id: parseForecastData
            expression:
              jq:
                id: jqcfe3
                expression: ".current_weather | { currentTemperature: .temperature, time }"
        - unmarshal:
            id: unmarshalForecastData
            json:
              id: json415a
              library: Jackson
        - setVariable:
            id: setVariableForecast
            name: forecast
            expression:
              simple:
                id: simple9c53
                expression: ${body}
        - to:
            id: createResponse
            uri: velocity
            parameters:
              resourceUri: response.vm
